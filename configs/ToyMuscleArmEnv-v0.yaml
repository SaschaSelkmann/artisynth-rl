# Two-link arm with four muscles tracking a multi-sine reference trajectory.
# Reward function: src/python/artisynth_envs/envs/toymusclearm_env.py → _reward()
# Termination:    same file → _terminated()

env: ToyMuscleArmEnv-v0
algorithm: SAC
run_name: toymusclearm_baseline

# ArtiSynth connection
ip: localhost
port: 8080

# Env behaviour
include_current_state: true
include_current_excitations: true
incremental_actions: false
zero_excitations_on_reset: true
episode_duration: 10.0          # seconds; episode runs the full duration unless physics breaks
wait_action: 0.05               # sim seconds advanced per agent step (= 200 steps / episode)

# Reward shaping
goal_threshold_deg: 5.0         # per-step +goal_reward when both errors below this
goal_reward: 0.1
w_u: 1.0                        # tracking-error weight (theta - theta_ref)^2
w_r: 0.01                       # excitation-effort weight ||u||^2

# Termination — pure physical-failure checks. Tracking error is NOT used here;
# the reward function alone shapes tracking quality so transient excursions
# and oscillations around the trajectory are tolerated.
pinned_enabled: true            # joint stuck against its hard limit
pinned_angle_tol_deg: 1.0
pinned_velocity_tol: 0.1        # rad/s
pinned_consecutive_steps: 20    # 1.0 s of sim time

velocity_blowup_enabled: true   # numerical instability safety net
velocity_blowup_rad_s: 30.0
velocity_blowup_consecutive_steps: 5

# Training infrastructure
n_envs: 4
seed: 12345
timesteps: 750000
log_interval: 1000

# Algorithm hyperparameters
algorithm_kwargs:
  learning_rate: 3.0e-4
  batch_size: 256
  gamma: 0.99
  buffer_size: 100000
  learning_starts: 2000
  tau: 0.005
  ent_coef: auto

# Optuna search space (used by optimize.py)
optuna:
  n_trials: 50
  trial_timesteps: 100000
  eval_episodes: 5
  search_space:
    learning_rate: {type: float, low: 1.0e-5, high: 1.0e-3, log: true}
    batch_size:    {type: categorical, choices: [64, 128, 256, 512]}
    gamma:         {type: float, low: 0.9, high: 0.9999}
