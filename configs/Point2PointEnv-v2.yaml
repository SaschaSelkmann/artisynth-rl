# Point-to-point tracking (2D, 8 muscles)
# Reward function: src/python/artisynth_envs/envs/point2point_env.py → _calculate_reward()

env: Point2PointEnv-v2
algorithm: SAC

# ArtiSynth connection
ip: localhost
port: 8080

# Env behaviour
include_current_state: true
include_current_excitations: true
incremental_actions: false
zero_excitations_on_reset: true
goal_threshold: 0.1
goal_reward: 5.0
reset_step: 200
wait_action: 0.0

# Training infrastructure
n_envs: 4
seed: 12345
timesteps: 500000
log_interval: 1000   # write TensorBoard metrics every N episodes (reduce for less disk I/O stutter)

# Algorithm hyperparameters (passed to the SB3 constructor)
# Unused keys for the chosen algorithm are silently ignored.
algorithm_kwargs:
  learning_rate: 3.0e-4
  batch_size: 256
  gamma: 0.99
  buffer_size: 100000
  learning_starts: 1000
  tau: 0.005
  ent_coef: auto

# Optuna search space (used by optimize.py, ignored by train.py / test.py)
optuna:
  n_trials: 50
  trial_timesteps: 100000
  eval_episodes: 5
  search_space:
    learning_rate: {type: float, low: 1.0e-5, high: 1.0e-3, log: true}
    batch_size:    {type: categorical, choices: [64, 128, 256, 512]}
    gamma:         {type: float, low: 0.9, high: 0.9999}
