# Lumbar spine (6 vertebrae)
# Reward function: src/python/artisynth_envs/envs/spine_env.py → _calc_reward()
# Weights (w_u, w_d, w_r) are defined as defaults in SpineEnv.__init__().

env: SpineEnv-v0
algorithm: SAC

# ArtiSynth connection
ip: localhost
port: 8080

# Env behaviour
include_current_state: true
include_current_excitations: true
incremental_actions: false
zero_excitations_on_reset: true
goal_threshold: 0.05
goal_reward: 5.0
reset_step: 500
wait_action: 0.0

# Training infrastructure
n_envs: 2
seed: 12345
timesteps: 1000000

# Algorithm hyperparameters
algorithm_kwargs:
  learning_rate: 3.0e-4
  batch_size: 256
  gamma: 0.99
  buffer_size: 200000
  learning_starts: 1000
  tau: 0.005
  ent_coef: auto

# Optuna search space
optuna:
  n_trials: 50
  trial_timesteps: 200000
  eval_episodes: 5
  search_space:
    learning_rate: {type: float, low: 1.0e-5, high: 1.0e-3, log: true}
    batch_size:    {type: categorical, choices: [64, 128, 256, 512]}
    gamma:         {type: float, low: 0.9, high: 0.9999}
    tau:           {type: float, low: 0.001, high: 0.05, log: true}
